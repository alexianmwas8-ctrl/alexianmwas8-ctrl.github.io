<!DOCTYPE html>
<html>
<head>
<title>User Information Form</title>

<style>

/* PAGE STYLE */

body{
font-family:"Segoe UI", Arial, sans-serif;
background:linear-gradient(to right,#eef2f3,#d9e4f5);
padding:40px;
}


/* FORM CONTAINER */

.form-container{
width:420px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}


/* FORM TITLE */

h2{
text-align:center;
color:#2c3e50;
margin-bottom:20px;
}


/* LABELS */

label{
font-weight:bold;
color:#333;
display:block;
margin-top:10px;
}


/* INPUT FIELDS */

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
transition:0.3s;
}

input:focus,textarea:focus{
border-color:#3498db;
outline:none;
box-shadow:0 0 5px rgba(52,152,219,0.4);
}


/* GENDER SECTION */

.gender{
margin-bottom:15px;
}


/* BUTTON AREA */

.buttons{
text-align:center;
}


/* BUTTONS */

button{
padding:10px 18px;
margin:6px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}


/* SUBMIT BUTTON */

.submit{
background:#2ecc71;
color:white;
}

.submit:hover{
background:#27ae60;
}


/* CLEAR BUTTON */

.clear{
background:#f39c12;
color:white;
}

.clear:hover{
background:#e67e22;
}


/* CANCEL BUTTON */

.cancel{
background:#e74c3c;
color:white;
}

.cancel:hover{
background:#c0392b;
}

</style>

</head>

<body>

<div class="form-container">

<h2>User Information Form</h2>

<form>

<label>First Name</label>
<input type="text" name="firstname">

<label>Last Name</label>
<input type="text" name="lastname">

<label>Date of Birth</label>
<input type="date" name="dob">

<label>Gender</label>

<div class="gender">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>

<label>Opinion about Ubuntu</label>
<textarea rows="4">
The people we associate with help to form someone's identity
</textarea>

<div class="buttons">

<button type="submit" class="submit">Submit</button>

<button type="reset" class="clear">Clear</button>

<button type="button" class="cancel">Cancel</button>

</div>

</form>

</div>

</body>
</html>
