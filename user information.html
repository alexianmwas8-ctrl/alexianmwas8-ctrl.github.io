<!DOCTYPE html>
<html>
<head>
<title>User Information Form</title>

<style>

body{
font-family: Arial;
background:#eef2f7;
padding:40px;
}

.form-container{
width:400px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2c3e50;
}

label{
font-weight:bold;
color:#333;
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

.gender{
margin-bottom:15px;
}

.buttons{
text-align:center;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.submit{
background:#2ecc71;
color:white;
}

.clear{
background:#e67e22;
color:white;
}

.cancel{
background:#e74c3c;
color:white;
}

</style>
</head>

<body>

<div class="form-container">

<h2>User Information Form</h2>

<form>

<label>First Name</label>
<input type="text" name="firstname">

<label>Last Name</label>
<input type="text" name="lastname">

<label>Date of Birth</label>
<input type="date" name="dob">

<label>Gender</label>

<div class="gender">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>

<label>Opinion about Ubuntu</label>
<textarea rows="4">The people we associate with help to form someone's identity </textarea>

<div class="buttons">

<button type="submit" class="submit">Submit</button>

<button type="reset" class="clear">Clear</button>

<button type="button" class="cancel">Cancel</button>

</div>

</form>

</div>

</body>
</html>
